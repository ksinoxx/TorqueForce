<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Админ — Заказ</title>
    <link rel="stylesheet" href="/site.css">
</head>
<body>
    <div class="header">
        <div class="container nav">
            <div class="nav-left">
                <span class="brand"><a href="/index.html">Torque//Force</a></span>
                <a href="/catalog.html">Каталог</a>
                <a href="/cart.html">Корзина <span id="cartBadge" class="badge">0</span></a>
                <a href="/admin-orders.html">Админ: заказы</a>
            </div>
            <span class="muted">GET /api/admin/orders/{id}</span>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <h1>Заказ #<span id="oid">—</span></h1>
            <div class="muted" id="meta">Загрузка...</div>

            <div id="msg" class="toast" style="display:none;"></div>
            <div class="hr"></div>

            <div class="row">
                <div class="card">
                    <h2>Позиции</h2>
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Запчасть</th>
                                <th style="width:120px;">Цена</th>
                                <th style="width:110px;">Кол-во</th>
                                <th style="width:140px;">Сумма</th>
                            </tr>
                        </thead>
                        <tbody id="itemsRows">
                            <tr><td colspan="4" class="muted">Загрузка...</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="card">
                    <h2>Статус</h2>
                    <div><b>Текущий:</b> <span id="status">—</span></div>

                    <div class="hr"></div>

                    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                        <select id="newStatus">
                            <option>Принят</option>
                            <option>В обработке</option>
                            <option>Выдан</option>
                        </select>
                        <button class="btn" onclick="setStatus()">Сохранить</button>
                        <a class="btn btn-secondary" href="/admin-orders.html">Назад</a>
                    </div>

                    <div class="hr"></div>

                    <h2>История</h2>
                    <div id="history" class="muted">—</div>
                </div>
            </div>
        </div>
    </div>

    <script>
  const CART_KEY = "cart_v1";
  function getCart(){ try { return JSON.parse(localStorage.getItem(CART_KEY) || "[]"); } catch { return []; } }
  document.getElementById("cartBadge").textContent = getCart().reduce((s,x)=>s+(x.quantity||0),0);

  const params = new URLSearchParams(location.search);
  const orderId = Number(params.get("id"));

  function showMsg(text, isError=false) {
    const el = document.getElementById("msg");
    el.className = "toast" + (isError ? " error" : "");
    el.textContent = text;
    el.style.display = "block";
  }

  function formatMoney(v) {
    const n = Number(v || 0);
    return n.toLocaleString("ru-RU", { style: "currency", currency: "RUB" });
  }
  function escapeHtml(s) {
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  async function loadOrder() {
    document.getElementById("oid").textContent = isFinite(orderId) ? orderId : "—";
    if (!isFinite(orderId) || orderId <= 0) {
      showMsg("Не указан id заказа (например /admin-order.html?id=1)", true);
      return;
    }

    try {
      const res = await fetch(`/api/admin/orders/${orderId}`, { headers: { "Accept":"application/json" }});
      if (!res.ok) throw new Error("API вернул " + res.status);

      const o = await res.json();
     

      document.getElementById("meta").textContent =
        `Клиент: ${o.clientName || "—"} | Дата: ${new Date(o.orderDate).toLocaleString("ru-RU")} | Итого: ${formatMoney(o.totalPrice)}`;

      document.getElementById("status").textContent = o.status || "—";
      if (o.status) document.getElementById("newStatus").value = o.status;

      const itemsRows = document.getElementById("itemsRows");
      if (!o.items || !o.items.length) {
        itemsRows.innerHTML = `<tr><td colspan="4" class="muted">Позиции не найдены</td></tr>`;
      } else {
        itemsRows.innerHTML = o.items.map(it => {
          const sum = Number(it.price || 0) * Number(it.quantity || 0);
          return `
            <tr>
              <td><b>${escapeHtml(it.partName || ("ID " + it.partId))}</b></td>
              <td>${formatMoney(it.price)}</td>
              <td>${it.quantity}</td>
              <td>${formatMoney(sum)}</td>
            </tr>
          `;
        }).join("");
      }

      const historyEl = document.getElementById("history");
      if (!o.history || !o.history.length) {
        historyEl.textContent = "Истории статусов нет";
      } else {
        historyEl.innerHTML = o.history.map(h =>
          `<div><b>${escapeHtml(h.status)}</b>: ${new Date(h.dateStart).toLocaleString("ru-RU")} — ${h.dateEnd ? new Date(h.dateEnd).toLocaleString("ru-RU") : "сейчас"}</div>`
        ).join("");
      }

    } catch (e) {
      showMsg(String(e.message || e), true);
    }
  }

  async function setStatus() {
    document.getElementById("msg").style.display = "none";
    const status = document.getElementById("newStatus").value;

    try {
      const res = await fetch(`/api/admin/orders/${orderId}/status`, {
        method: "POST",
        headers: { "Content-Type":"application/json", "Accept":"application/json" },
        body: JSON.stringify({ status })
      });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(`Ошибка смены статуса (${res.status}): ${text}`);
      }

      showMsg(`Статус изменён на: ${status}`);
      await loadOrder();
    } catch (e) {
      showMsg(String(e.message || e), true);
    }
  }

  loadOrder();
    </script>
</body>
</html>
